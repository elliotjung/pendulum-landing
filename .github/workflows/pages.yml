name: Deploy landing to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: landing-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run audit
      - run: npx playwright install --with-deps chromium firefox webkit
      - name: Rebuild and verify committed generated assets
        shell: bash
        run: |
          npm run build:hero
          npm run build:ko
          git diff --exit-code -- assets/scene.bundle.js ko.html
      - run: npm run check
      - run: npm run smoke:ci
      - run: npm run lighthouse:lhci
      - name: Prepare explicit public-file allowlist
        shell: bash
        run: |
          install -d _site/assets
          cp index.html ko.html 404.html robots.txt sitemap.xml _site/
          rsync -a --delete assets/ _site/assets/
          test ! -e _site/package.json
          test ! -e _site/package-lock.json
          test ! -e _site/scripts
          test ! -e _site/tests
          test ! -e _site/_headers
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: landing-quality-reports
          path: |
            reports/lighthouse/
            reports/playwright/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

  deploy:
    needs: quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy the verified allowlisted artifact
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
