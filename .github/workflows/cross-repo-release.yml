name: Cross-repository release
run-name: Cross-repo release ${{ github.event.client_payload.tag || inputs.tag }} from ${{ github.event.client_payload.orchestrator_run_id || github.run_id }}

on:
  repository_dispatch:
    types: [pendulum-release]
  workflow_dispatch:
    inputs:
      tag:
        description: Simulator release tag
        type: string
        required: true
      release_commit:
        description: Simulator release commit SHA
        type: string
        required: true
      source_commit:
        description: Expected evidence source commit SHA
        type: string
        required: true

permissions:
  contents: read

concurrency:
  group: landing-main-writes
  cancel-in-progress: false

jobs:
  gate-and-tag:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event.client_payload.tag || inputs.tag }}
      RELEASE_COMMIT: ${{ github.event.client_payload.release_commit || inputs.release_commit }}
      EXPECTED_SOURCE_COMMIT: ${{ github.event.client_payload.source_commit || inputs.source_commit }}
      EVIDENCE_BASE64: ${{ github.event.client_payload.evidence_base64 || '' }}
      EXPECTED_EVIDENCE_SHA256: ${{ github.event.client_payload.evidence_sha256 || '' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Validate the simulator tag and immutable commit coordinate
        shell: bash
        run: |
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]] || {
            echo "Invalid release tag: $RELEASE_TAG" >&2
            exit 1
          }
          [[ "$RELEASE_COMMIT" =~ ^[0-9a-f]{40}$ ]] || {
            echo "release_commit must be a full lowercase SHA-1" >&2
            exit 1
          }
          [[ "$EXPECTED_SOURCE_COMMIT" =~ ^[0-9a-f]{40}$ ]] || {
            echo "source_commit must be a full lowercase SHA-1" >&2
            exit 1
          }
          if [ -n "$EXPECTED_EVIDENCE_SHA256" ]; then
            [[ "$EXPECTED_EVIDENCE_SHA256" =~ ^[0-9a-f]{64}$ ]] || {
              echo "evidence_sha256 must be a full lowercase SHA-256" >&2
              exit 1
            }
          fi
          refs="$(git ls-remote --exit-code --tags https://github.com/elliotjung/pendulum-lab.git \
            "refs/tags/$RELEASE_TAG" "refs/tags/$RELEASE_TAG^{}")"
          remote_commit="$(printf '%s\n' "$refs" | awk '/\^\{\}$/ {print $1; found=1} END {if (!found && NR) print first} NR==1 {first=$1}')"
          [ "$remote_commit" = "$RELEASE_COMMIT" ] || {
            echo "Simulator tag $RELEASE_TAG resolves to $remote_commit, not $RELEASE_COMMIT" >&2
            exit 1
          }
      - name: Materialize the exact release evidence payload
        shell: bash
        run: |
          test -n "$RELEASE_TAG" && test -n "$RELEASE_COMMIT" && test -n "$EXPECTED_SOURCE_COMMIT"
          if [ -n "$EVIDENCE_BASE64" ]; then
            printf '%s' "$EVIDENCE_BASE64" | base64 --decode > assets/evidence-summary.json
          else
            curl --fail --silent --show-error --retry 5 \
              -o assets/evidence-summary.json \
              "https://raw.githubusercontent.com/elliotjung/pendulum-lab/${RELEASE_COMMIT}/reports/evidence-summary.json"
          fi
          actual_sha256="$(sha256sum assets/evidence-summary.json | cut -d' ' -f1)"
          if [ -n "$EXPECTED_EVIDENCE_SHA256" ]; then
            test "$actual_sha256" = "$EXPECTED_EVIDENCE_SHA256" || {
              echo "evidence SHA-256 $actual_sha256 does not match dispatched $EXPECTED_EVIDENCE_SHA256" >&2
              exit 1
            }
          fi
          actual="$(node -e "process.stdout.write(require('./assets/evidence-summary.json').provenance.sourceCommit)")"
          test "$actual" = "$EXPECTED_SOURCE_COMMIT" || {
            echo "evidence source $actual does not match dispatched $EXPECTED_SOURCE_COMMIT" >&2
            exit 1
          }
      - run: node scripts/sync-kernel-manifest.mjs
      - run: npm run sync:changelog
      # Static copy (meta description, OG alt text, no-JS fallbacks, Korean
      # dictionary) and the count baked into the og-card pixels follow the
      # dispatched evidence, so a release can never ship stale numbers.
      - run: npm run sync:copy
      - run: npx playwright install --with-deps chromium
      - run: npm run assets:og-card
      - run: npm run build:ko
      - name: Static, accessibility, and browser gate
        env:
          PENDULUM_EXPECTED_SOURCE_COMMIT: ${{ env.EXPECTED_SOURCE_COMMIT }}
        run: npm run check
      - run: npm run smoke
      - run: npm run lighthouse:lhci
      - name: Commit synchronized release evidence
        shell: bash
        run: |
          if git diff --quiet; then
            echo "release evidence already synchronized"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            unexpected="$(git status --short | cut -c4- | grep -Ev '^(assets/(evidence-summary\.json|demo-kernel-manifest\.json|changelog-highlights\.json|i18n-core\.js|og-card\.png|og-card-meta\.json)|index\.html|ko\.html)$' || true)"
            [ -z "$unexpected" ] || {
              echo "Refusing to commit unexpected generated paths:" >&2
              printf '%s\n' "$unexpected" >&2
              exit 1
            }
            git add -- assets/evidence-summary.json assets/demo-kernel-manifest.json \
              assets/changelog-highlights.json assets/i18n-core.js assets/og-card.png \
              assets/og-card-meta.json index.html ko.html
            git commit -m "chore: sync ${RELEASE_TAG} release evidence"
            git push
          fi
      - name: Create the coordinated landing tag
        shell: bash
        run: |
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            test "$(git rev-list -n 1 "$RELEASE_TAG")" = "$(git rev-parse HEAD)" || {
              echo "landing tag $RELEASE_TAG already points to a different commit" >&2
              exit 1
            }
          else
            git tag -a "$RELEASE_TAG" -m "Pendulum Lab coordinated release $RELEASE_TAG"
            git push origin "$RELEASE_TAG"
          fi
