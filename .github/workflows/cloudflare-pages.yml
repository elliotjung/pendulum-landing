name: Cloudflare Pages mirror

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # build:ko renders index.html in headless Chromium, so browsers must be
      # installed before it (this workflow's first live run failed here).
      - run: npx playwright install --with-deps chromium
      - run: npm run build:ko
      - run: npm run check
      - run: npm run smoke
      - run: npm run lighthouse:lhci
      - name: Prepare static mirror artifact
        shell: bash
        run: |
          mkdir -p _site
          cp index.html ko.html 404.html robots.txt sitemap.xml _headers _site/
          mkdir -p _site/assets
          rsync -a assets/ _site/assets/
      - name: Deploy mirror with custom isolation headers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" && test -n "$CLOUDFLARE_ACCOUNT_ID" || {
            echo "Cloudflare mirror skipped: configure project-scoped CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID."
            exit 0
          }
          npx wrangler pages deploy _site --project-name pendulum-landing --branch "${GITHUB_REF_NAME}"
