name: Cloudflare Pages mirror

on:
  # The mirror is optional and credentialed. An explicit dispatch fails closed
  # when configuration is missing without making every GitHub Pages push red.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: landing-cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: cloudflare-pages
    steps:
      - name: Require an explicitly configured mirror
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_MIRROR_URL: ${{ vars.CLOUDFLARE_MIRROR_URL }}
        shell: bash
        run: |
          missing=()
          [ -n "$CLOUDFLARE_API_TOKEN" ] || missing+=(CLOUDFLARE_API_TOKEN)
          [ -n "$CLOUDFLARE_ACCOUNT_ID" ] || missing+=(CLOUDFLARE_ACCOUNT_ID)
          [ -n "$CLOUDFLARE_MIRROR_URL" ] || missing+=(CLOUDFLARE_MIRROR_URL)
          if [ "${#missing[@]}" -ne 0 ]; then
            printf '## Cloudflare mirror: blocked\n\nMissing configuration: `%s`.\n' "${missing[*]}" >> "$GITHUB_STEP_SUMMARY"
            echo "Cloudflare mirror is required but not configured: ${missing[*]}" >&2
            exit 1
          fi
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run audit
      # build:ko renders index.html in headless Chromium, so browsers must be
      # installed before it (this workflow's first live run failed here).
      - run: npx playwright install --with-deps chromium
      - run: npm run build:hero
      - run: npm run build:ko
      - run: git diff --exit-code -- assets/scene.bundle.js ko.html
      - run: npm run check
      - run: npx playwright test tests/landing-smoke.spec.ts --project=chromium --project=mobile-chrome
      - run: npm run lighthouse:lhci
      - name: Prepare static mirror artifact
        shell: bash
        run: |
          mkdir -p _site
          cp index.html ko.html 404.html robots.txt sitemap.xml _headers _site/
          mkdir -p _site/assets
          rsync -a assets/ _site/assets/
      - name: Deploy mirror with custom isolation headers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          npm exec --no -- wrangler pages deploy _site --project-name pendulum-landing --branch "${GITHUB_REF_NAME}"
      - name: Verify deployed isolation and security headers
        env:
          CLOUDFLARE_MIRROR_URL: ${{ vars.CLOUDFLARE_MIRROR_URL }}
        shell: bash
        run: |
          headers="$(curl --fail --silent --show-error --retry 5 --retry-all-errors --dump-header - --output /dev/null "$CLOUDFLARE_MIRROR_URL")"
          printf '%s\n' "$headers" | grep -Eiq '^cross-origin-opener-policy:[[:space:]]*same-origin'
          printf '%s\n' "$headers" | grep -Eiq '^cross-origin-embedder-policy:[[:space:]]*require-corp'
          printf '%s\n' "$headers" | grep -Eiq '^x-content-type-options:[[:space:]]*nosniff'
          printf '## Cloudflare mirror: verified\n\n%s returned the required COOP, COEP, and nosniff headers.\n' "$CLOUDFLARE_MIRROR_URL" >> "$GITHUB_STEP_SUMMARY"
