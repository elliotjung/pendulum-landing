name: Evidence Sync

# Structural fix for cross-repo evidence drift (the old flow copied
# assets/evidence-summary.json by hand). The simulation repo dispatches
# `evidence-updated` whenever its committed evidence summary changes
# (.github/workflows/evidence-dispatch.yml over there); this workflow pulls
# the summary, realigns the demo-kernel manifest provenance, re-runs the full
# static gate + smoke suite (which pins the kernel's numeric parity with the
# main repo), and only then commits the sync to main. That push is rebuilt and
# published by the repository's single Pages workflow. A weekly cron catches
# missed dispatches.

on:
  repository_dispatch:
    types: [evidence-updated]
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

concurrency:
  group: landing-main-writes
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Fetch evidence summary from the simulation repo
        shell: bash
        env:
          EXPECTED_SOURCE_COMMIT: ${{ github.event.client_payload.source_commit || '' }}
          DISPATCHED_EVIDENCE_COMMIT: ${{ github.event.client_payload.pushed_commit || '' }}
        run: |
          if [ -n "$DISPATCHED_EVIDENCE_COMMIT" ]; then
            [[ "$DISPATCHED_EVIDENCE_COMMIT" =~ ^[0-9a-f]{40}$ ]] || {
              echo "pushed_commit must be a full lowercase SHA-1" >&2
              exit 1
            }
            evidence_commit="$DISPATCHED_EVIDENCE_COMMIT"
          else
            evidence_commit="$(git ls-remote --exit-code https://github.com/elliotjung/pendulum-lab.git refs/heads/master | cut -f1)"
          fi
          url="https://raw.githubusercontent.com/elliotjung/pendulum-lab/${evidence_commit}/reports/evidence-summary.json"
          for attempt in 1 2 3 4 5 6; do
            if curl --fail --silent --show-error -o assets/evidence-summary.json "$url"; then
              actual="$(node -e "process.stdout.write(require('./assets/evidence-summary.json').provenance.sourceCommit)")"
              if [ -z "$EXPECTED_SOURCE_COMMIT" ] || [ "$actual" = "$EXPECTED_SOURCE_COMMIT" ]; then
                echo "fetched evidence for source commit $actual"
                exit 0
              fi
              echo "attempt $attempt: raw served $actual, expected $EXPECTED_SOURCE_COMMIT; retrying…"
            else
              echo "attempt $attempt: evidence download failed; retrying…" >&2
            fi
            sleep 10
          done
          echo "raw content never caught up with the dispatched commit" >&2
          exit 1
      - name: Align demo-kernel manifest provenance
        run: node scripts/sync-kernel-manifest.mjs
      - name: Synchronize evidence-backed copy and generated page
        run: |
          npm run sync:copy
          npm run assets:og-card
          npm run build:ko
      - name: Full static gate against the synced evidence
        env:
          PENDULUM_EXPECTED_SOURCE_COMMIT: ${{ github.event.client_payload.source_commit || '' }}
        run: npm run check
      # The smoke suite includes the kernel-parity fixture test, which is what
      # makes the manifest realignment above honest (see sync-kernel-manifest.mjs).
      - run: npm run smoke
      - name: Commit and push the sync if anything changed
        shell: bash
        run: |
          if git diff --quiet -- assets/evidence-summary.json assets/demo-kernel-manifest.json assets/i18n-core.js assets/og-card.png assets/og-card-meta.json index.html ko.html; then
            echo "evidence already in sync; nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          source_commit="$(node -e "process.stdout.write(require('./assets/evidence-summary.json').provenance.sourceCommit.slice(0, 12))")"
          git add -- assets/evidence-summary.json assets/demo-kernel-manifest.json assets/i18n-core.js assets/og-card.png assets/og-card-meta.json index.html ko.html
          git commit -m "chore: sync evidence from pendulum-lab@${source_commit}"
          git push
