name: Landing CI

on:
  push:
    branches: [main]
  pull_request:
  repository_dispatch:
    types: [pendulum-release]

env:
  PENDULUM_EXPECTED_SOURCE_COMMIT: ${{ github.event.client_payload.source_commit || '' }}

permissions:
  contents: read

concurrency:
  group: landing-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npx playwright install --with-deps chromium
      # ko.html is generated from index.html + the dictionary
      # (scripts/build-ko-page.mjs); fail if the committed page drifted.
      - run: npm run build:ko
      - run: git diff --exit-code -- ko.html
      - run: npm run smoke
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: landing-playwright-report
          path: reports/playwright
          if-no-files-found: ignore

  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run lighthouse
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: landing-lighthouse-report
          path: reports/lighthouse
          if-no-files-found: ignore
