name: Landing CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: landing-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run audit
      - run: npm run check
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run build:hero
      # ko.html is generated from index.html + the dictionary
      # (scripts/build-ko-page.mjs); fail if the committed page drifted.
      - run: npm run build:ko
      - run: git diff --exit-code -- assets/scene.bundle.js ko.html
      - run: npm run smoke:ci
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: landing-playwright-report
          path: reports/playwright
          if-no-files-found: ignore

  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run audit
      - run: npm run check
      - run: npm run lighthouse:lhci
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: landing-lighthouse-report
          path: reports/lighthouse
          if-no-files-found: ignore
