name: Landing CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npx playwright install --with-deps chromium
      - run: npm run smoke
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: landing-playwright-report
          path: reports/playwright
          if-no-files-found: ignore

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lighthouse
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: landing-lighthouse-report
          path: reports/lighthouse
          if-no-files-found: ignore
